name: Docker Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  docker_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: echo "Running docker-build"
