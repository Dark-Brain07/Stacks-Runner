name: Release Notes
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  release_notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: echo "Running release-notes"
